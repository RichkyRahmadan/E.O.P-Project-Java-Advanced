<div class="auth-page animate-fade-up">

  <!-- Left: Branding Panel -->
  <div class="auth-brand-panel">
    <div class="auth-brand-content">
      <div class="auth-logo">
        <span class="logo-icon">👁</span>
        <span class="logo-text">E.O.P</span>
      </div>
      <h1 class="auth-headline">Buat akun<br>dompet digital.</h1>
      <p class="auth-sub">Bergabung dan nikmati layanan transfer, QRIS, dan pengaduan berbasis AI secara gratis.</p>
    </div>
  </div>

  <!-- Right: Form Panel -->
  <div class="auth-form-panel">
    <div class="auth-form-card">

      <div class="auth-form-header">
        <h2>Registrasi User</h2>
        <p>Isi data diri untuk membuat akun baru</p>
      </div>

      <div *ngIf="errorMessage" id="register-error-alert" class="alert alert-error">
        {{ errorMessage }}
      </div>

      <div *ngIf="successMessage" id="register-success-alert" class="alert alert-success" style="background: rgba(16, 185, 129, 0.1); border: 1px solid rgb(16, 185, 129); color: rgb(16, 185, 129); padding: 12px; border-radius: 8px; margin-bottom: 16px; font-size: 14px;">
        {{ successMessage }}
      </div>

      <form (ngSubmit)="onSubmit()" #registerForm="ngForm" class="auth-form">
        <div class="form-group">
          <label for="username">Username</label>
          <input
            type="text"
            id="username"
            name="username"
            [(ngModel)]="userData.username"
            placeholder="Min. 3 karakter"
            required
            minlength="3"
            #usernameInput="ngModel">
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input
            type="email"
            id="email"
            name="email"
            [(ngModel)]="userData.email"
            placeholder="contoh@domain.com"
            required
            email
            #emailInput="ngModel">
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            name="password"
            [(ngModel)]="userData.password"
            placeholder="Min. 8 karakter"
            required
            minlength="8"
            #passwordInput="ngModel">
        </div>

        <button
          type="submit"
          id="btn-register-submit"
          class="btn btn-primary btn-block"
          [disabled]="loading || !registerForm.valid">
          <span *ngIf="!loading">Buat Akun</span>
          <span *ngIf="loading">Memproses...</span>
        </button>
      </form>

      <div class="auth-footer">
        <p>Sudah punya akun? <a routerLink="/login" id="link-login">Masuk disini</a></p>
        <p>Ingin berjualan? <a routerLink="/register-merchant" id="link-register-merchant">Daftar Merchant</a></p>
      </div>

    </div>
  </div>

</div>
