<div class="login-wrapper animate-fade-in">
  <div class="glass-panel login-card">
    <div class="brand-header">
      <div class="priestess-eye">👁️</div>
      <h1>Registrasi Merchant</h1>
      <p class="subtitle">E.O.P — Daftarkan Akun Bisnis / Toko Anda</p>
    </div>

    <div *ngIf="errorMessage" id="merchant-error-alert" class="alert alert-error">
      {{ errorMessage }}
    </div>

    <form (ngSubmit)="onSubmit()" #merchantForm="ngForm" class="login-form">
      <div class="form-group">
        <label for="username">Username Akun</label>
        <input 
          type="text" 
          id="username" 
          name="username" 
          [(ngModel)]="merchantData.username" 
          placeholder="Min. 3 karakter" 
          required 
          minlength="3">
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input 
          type="email" 
          id="email" 
          name="email" 
          [(ngModel)]="merchantData.email" 
          placeholder="contoh@toko.com" 
          required 
          email>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input 
          type="password" 
          id="password" 
          name="password" 
          [(ngModel)]="merchantData.password" 
          placeholder="Min. 8 karakter" 
          required 
          minlength="8">
      </div>

      <div class="form-group">
        <label for="merchantName">Nama Toko / Merchant</label>
        <input 
          type="text" 
          id="merchantName" 
          name="merchantName" 
          [(ngModel)]="merchantData.merchantName" 
          placeholder="Contoh: Kedai Kopi Priestess" 
          required 
          maxlength="100">
      </div>

      <div class="form-group">
        <label for="address">Alamat Toko</label>
        <textarea 
          id="address" 
          name="address" 
          [(ngModel)]="merchantData.address" 
          placeholder="Tulis alamat lengkap merchant" 
          required 
          rows="2"></textarea>
      </div>

      <button 
        type="submit" 
        id="btn-merchant-submit" 
        class="btn btn-primary btn-block" 
        [disabled]="loading || !merchantForm.valid">
        <span *ngIf="!loading">Daftar Bisnis</span>
        <span *ngIf="loading">Mendaftarkan...</span>
      </button>
    </form>

    <div class="footer-links">
      <p>Sudah punya akun? <a routerLink="/login" id="link-login">Masuk disini</a></p>
      <p>Daftar sebagai pengguna biasa? <a routerLink="/register" id="link-register">Daftar User</a></p>
    </div>
  </div>
</div>
