# =============================================================================
# E.O.P GATEWAY — application.yml
# Port 8080 | Spring Cloud Gateway (WebMVC / Servlet-based)
#
# CATATAN ARSITEKTUR:
# Routing dan pemasangan GatewayJwtFilter didefinisikan sepenuhnya via Java DSL
# di kelas GatewayFilterConfig.java. File ini hanya berisi properti konfigurasi
# non-routing (port, app name, jwt secret, logging).
# =============================================================================

server:
  port: 8080

spring:
  application:
    name: eop-gateway

# =============================================================================
# PROPERTI KUSTOM E.O.P
# Nilai jwt.secret WAJIB identik dengan yang ada di Identity Service.
# =============================================================================
jwt:
  secret: Priestess_EOP_UAS_Secret_Key_2025_Secure!

# =============================================================================
# LOGGING
# =============================================================================
logging:
  level:
    com.priestess.gateway: DEBUG
    org.springframework.cloud.gateway: INFO
