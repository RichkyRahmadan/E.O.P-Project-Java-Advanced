# =============================================================
# E.O.P (Eyes Of Priestess) — docker-compose.yml (Placeholder)
# =============================================================
# Konfigurasi Docker Compose asli tidak disertakan di repository publik.
# File ini hanya menampilkan struktur layanan secara umum.
# Silakan lihat Docs/azure_docker_deployment_guide.md untuk panduan deployment.
#
# Layanan yang digunakan:
#   - PostgreSQL 16    (eop_identity_db, eop_finance_db)
#   - MongoDB 7        (eop_transaction_log, eop_support_db)
#   - Redis 7          (session cache)
#   - RabbitMQ 3.13    (message broker)
#   - Identity Service (Port 8081)
#   - Core Finance     (Port 8082)
#   - Oracle & Support (Port 8083)
#   - Gateway          (Port 8080)
#   - Frontend/Nginx   (Port 80)
# =============================================================

services:
  postgres:
    image: postgres:16-alpine
    # environment & volumes dikonfigurasi via .env

  mongodb:
    image: mongo:7

  redis:
    image: redis:7-alpine

  rabbitmq:
    image: rabbitmq:3.13-management-alpine

  identity:
    build: ./identity
    ports:
      - "8081:8081"

  core:
    build: ./core
    ports:
      - "8082:8082"

  oracle:
    build: ./oracle
    ports:
      - "8083:8083"

  gateway:
    build: ./gateway
    ports:
      - "8080:8080"

  frontend:
    build: ./frontend
    ports:
      - "80:80"
